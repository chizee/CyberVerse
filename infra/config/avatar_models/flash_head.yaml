flash_head:
    plugin_class: "inference.plugins.avatar.flash_head_plugin.FlashHeadAvatarPlugin"
    models_dir: "models"
    checkpoint_dir: "./checkpoints/SoulX-FlashHead-1_3B"
    wav2vec_dir: "./checkpoints/wav2vec2-base-960h"
    model_type: "pro" # "pro" is higher quality; "lite" is faster/lower cost.
    device: "cuda:0"
    seed: 9999
    # torch.compile can improve steady-state speed but may increase startup cost.
    compile_model: true
    compile_vae: true
    # Keeps multi-GPU collectives off background Python threads.
    dist_worker_main_thread: true
    infer_params:
        # These values define FlashHead's streaming window and output cadence.
        frame_num: 33
        motion_frames_latent_num: 2
        tgt_fps: 20
        sample_rate: 16000
        sample_shift: 5
        color_correction_strength: 1.0
        cached_audio_duration: 8
        num_heads: 12
        height: 512
        width: 512
