live_act:
    plugin_class: "inference.plugins.avatar.live_act_plugin.LiveActAvatarPlugin"
    models_dir: "models/SoulX-LiveAct"
    ckpt_dir: "./checkpoints/LiveAct"
    wav2vec_dir: "./checkpoints/chinese-wav2vec2-base"
    seed: 42
    # Memory/performance switches. Enable offload/cache compression only when GPU memory is tight.
    t5_cpu: false # When true, place the T5 text encoder on CPU to save GPU memory.
    fp8_gemm: true # Use FP8 GEMM acceleration when supported (default).
    fp4_gemm: false # Use FP4 GEMM on supported B-series GPUs; requires lightx2v_kernel (see README).
    fp8_kv_cache: false
    offload_cache: false
    block_offload: false
    mean_memory: false
    # torch.compile for Wan/VAE decode; slower startup, may be unstable in some dev environments.
    compile_wan_model: true # When true, torch.compile the Wan model; slower startup, may be unstable.
    compile_vae_decode: true
    dist_worker_main_thread: true
    default_prompt: "一个人在说话"
    infer_params:
        size: "272*480" # width*height; real-time resolution achievable on PRO 6000
        fps: 20
        audio_cfg: 1.0 # Audio classifier-free guidance scale.
