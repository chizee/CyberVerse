# CyberVerse example configuration.
# Copy the full template directory to a local editable config:
#   cp -r infra/config config
#
# Keep secrets in config/env. Values such as ${DASHSCOPE_API_KEY} are expanded
# from environment variables after config/env is loaded.

server:
    host: "0.0.0.0"
    http_port: 8080
    grpc_port: 50051
    cors_origins: ["*"]

livekit:
    url: "${LIVEKIT_URL}"
    api_key: "${LIVEKIT_API_KEY}"
    api_secret: "${LIVEKIT_API_SECRET}"

# Warm up inference components to reduce first-frame latency.
warmup:
    enabled: true
    distributed:
        enabled: true # Enable warmup in multi-GPU mode.
        timeout_s: 30 # Timeout in seconds to prevent hangs.

inference:
    avatar:
        # Set to false for pure voice sessions. Cached idle videos are still
        # served, but realtime speaking video and new idle video generation stop.
        enabled: true
        # Select the avatar backend initialized by the inference process.
        default: "flash_head" # Options: "flash_head", "live_act", "baidu_xiling"
        # cached_video plays a pre-rendered standby MP4 while idle.
        # silent_inference keeps one realtime avatar stream open and feeds idle audio.
        idle_strategy: "silent_inference"
        runtime:
            # Used by scripts/inference.sh; world_size must match the visible GPU count.
            cuda_visible_devices: 0 # Use 0,1 for two GPUs.
            world_size: 1
        # Each file under this directory contains one top-level avatar model
        # such as flash_head or live_act.
        model_config_dir: "avatar_models"

    omni:
        # Real realtime omni model providers only.
        default: "qwen_omni"
        doubao:
            plugin_class: "inference.plugins.voice_llm.doubao_realtime.DoubaoRealtimePlugin"
            # Prefer DOUBAO_API_KEY for the new console auth flow; app_id/access_token are legacy auth.
            api_key: "${DOUBAO_API_KEY}"
            access_token: "${DOUBAO_ACCESS_TOKEN}"
            app_id: "${DOUBAO_APP_ID}"
            voice_type: "zh_female_default"
            # Avoid DialogAudioIdleTimeoutError before FlashHead's first chunk arrives.
            enable_custom_vad: true # Required for end_smooth_window_ms to take effect.
            end_smooth_window_ms: 6000
        qwen_omni:
            plugin_class: "inference.plugins.voice_llm.qwen_omni_realtime.QwenOmniRealtimePlugin"
            api_key: "${DASHSCOPE_API_KEY}"
            model: "qwen3.5-omni-flash-realtime"
            voice: "Tina"
            input_sample_rate: 16000
            output_sample_rate: 24000
            vad_type: "semantic_vad"
            vad_threshold: 0.5 # VAD sensitivity; higher usually requires clearer speech.
            vad_silence_duration_ms: 800 # Silence duration that ends a user turn.
        grok:
            plugin_class: "inference.plugins.voice_llm.openai_realtime_compatible.OpenAIRealtimeCompatiblePlugin"
            provider_label: "grok"
            api_key: "${XAI_API_KEY}"
            ws_url: "wss://api.x.ai/v1/realtime"
            model: "grok-voice-think-fast-1.0"
            voice: "eve"
            input_sample_rate: 16000
            output_sample_rate: 24000
            vad_type: "server_vad"
            vad_threshold: 0.85
            vad_silence_duration_ms: 800
            reasoning_effort: "high"
            session_audio_schema: "nested"
            websocket_compression: null
            connect_attempts: 8
            connect_retry_delay_seconds: 0.5
        gemini:
            plugin_class: "inference.plugins.voice_llm.gemini_live.GeminiLivePlugin"
            api_key: "${GEMINI_API_KEY}"
            ws_url: "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent"
            model: "gemini-3.1-flash-live-preview"
            voice: "Kore"
            input_sample_rate: 16000
            output_sample_rate: 24000
            response_modalities: ["AUDIO"]
            proxy: "${GEMINI_PROXY}"
            websocket_compression: null
            connect_attempts: 3
            connect_retry_delay_seconds: 0.5
            input_transcription: true
            output_transcription: true
        openai_realtime:
            plugin_class: "inference.plugins.voice_llm.openai_realtime_compatible.OpenAIRealtimeCompatiblePlugin"
            provider_label: "openai_realtime"
            api_key: "${OPENAI_API_KEY}"
            ws_url: "wss://api.openai.com/v1/realtime"
            model: "gpt-realtime-1.5"
            voice: "marin"
            input_source_sample_rate: 16000
            input_sample_rate: 24000
            output_sample_rate: 24000
            input_audio_format: "audio/pcm"
            output_audio_format: "audio/pcm"
            vad_type: "semantic_vad"
            session_schema: "openai_realtime_current"
            proxy: "${OPENAI_PROXY}"
            websocket_compression: null
            connect_attempts: 3
            connect_retry_delay_seconds: 0.5

    persona:
        # PersonaAgent is the orchestration layer. It wraps a concrete omni
        # provider selected by the character/session and coordinates background tasks.
        plugin_class: "inference.plugins.voice_llm.persona_agent.PersonaAgentPlugin"
        subagent:
            agent_runtime: "pi"
            workspace_root: "./data/subagents"
            provider: "qwen"
            model: "qwen3.6-plus"
            timeout_seconds: 1800
            artifact_max_bytes: 1000000
            # Optional role-wide Pi package sources, for example npm:my-pi-package.
            # Character-specific extension package URLs are stored in character.json.
            extension_package_urls: []
            # Optional explicit role map. When set, roles outside the map are rejected.
            roles: {}

    llm:
        # Used by standard mode and by PersonaAgent's local sub-agent runtime.
        # The global system prompt is owned by the Go orchestrator; do not
        # duplicate persona prompts here.
        default: "qwen"
        qwen:
            plugin_class: "inference.plugins.llm.qwen_plugin.QwenLLMPlugin"
            api_key: "${DASHSCOPE_API_KEY}"
            model: "qwen3.6-plus"
            temperature: 0.7 # Sampling randomness for LLM output.
            extra_body:
                enable_thinking: false # Disable Qwen thinking mode for faster spoken replies.
        openai:
            plugin_class: "inference.plugins.llm.openai_plugin.OpenAILLMPlugin"
            api_key: "${OPENAI_API_KEY}"
            model: "gpt-4o"
            temperature: 0.7 # Sampling randomness for LLM output.
        litellm:
            plugin_class: "inference.plugins.llm.litellm_plugin.LiteLLMPlugin"
            model: "anthropic/claude-sonnet-4-6" # Any litellm model string.
            temperature: 0.7
            # api_key: "${ANTHROPIC_API_KEY}" # Or set provider env vars directly.

    embedding:
        # Used by local character RAG indexes.
        default: "qwen"
        qwen:
            api_key: "${DASHSCOPE_API_KEY}"
            model: "text-embedding-v4"
        openai:
            api_key: "${OPENAI_API_KEY}"
            model: "text-embedding-3-small"

    tts:
        # Used by standard mode after the LLM response is generated.
        default: "qwen"
        doubao:
            plugin_class: "inference.plugins.tts.doubao_tts_plugin.DoubaoTTSPlugin"
            # Doubao-TTS 2.0 bidirectional WebSocket. Prefer DOUBAO_API_KEY for
            # the new console auth flow; app_id/access_token are legacy auth.
            api_key: "${DOUBAO_API_KEY}"
            app_id: "${DOUBAO_APP_ID}"
            access_token: "${DOUBAO_ACCESS_TOKEN}"
            model: "seed-tts-2.0"
            resource_id: "seed-tts-2.0"
            voice: "zh_female_xiaohe_uranus_bigtts"
            format: "pcm"
            sample_rate: 24000
            target_sample_rate: 16000 # Resampled rate sent to avatar models.
        qwen:
            plugin_class: "inference.plugins.tts.qwen_tts_plugin.QwenTTSPlugin"
            api_key: "${DASHSCOPE_API_KEY}"
            # The frontend can select qwen3-tts-flash-realtime or CosyVoice
            # models. Set DASHSCOPE_COSYVOICE_WS_URL only to override the
            # default CosyVoice inference WebSocket endpoint.
            model: "qwen3-tts-flash-realtime"
            voice: "Momo"
            sample_rate: 24000
            target_sample_rate: 16000 # Resampled rate sent to avatar models.
        openai:
            plugin_class: "inference.plugins.tts.openai_tts_plugin.OpenAITTSPlugin"
            api_key: "${OPENAI_API_KEY}"
            model: "tts-1"
            voice: "nova"

    asr:
        # Used by standard mode to transcribe microphone input.
        default: "qwen"
        qwen:
            plugin_class: "inference.plugins.asr.qwen_asr_plugin.QwenASRPlugin"
            api_key: "${DASHSCOPE_API_KEY}"
            model: "qwen3-asr-flash-realtime"
            language: "auto" # Auto-detect language; set a code to force one.
            sample_rate: 16000
            vad_threshold: 0.8 # Speech detection sensitivity for ASR turns.
            vad_silence_duration_ms: 600 # Silence duration that finalizes ASR text.
        whisper:
            plugin_class: "inference.plugins.asr.whisper_plugin.WhisperASRPlugin"
            model_size: "base" # Whisper model size, such as base/small/medium.
            language: "auto"
            device: "cpu"

session:
    max_concurrent: 4
    idle_timeout_s: 300
    max_duration_s: 3600

pipeline:
    default_mode: "omni"
    streaming_mode: "direct" # "direct" = P2P WebRTC, "livekit" = LiveKit SFU.
    rag:
        enabled: true
        top_k: 5
        min_score: 0.25 # Drop retrieval hits below this relevance score.
        max_context_chars: 4500 # Max retrieved text injected into prompts.
        chunk_chars: 900 # Target document chunk size during indexing.
        chunk_overlap_chars: 120 # Overlap between adjacent indexed chunks.
    visual_input:
        enabled: true
        frame_interval_ms: 1000 # Minimum interval between accepted visual frames.
        max_width: 1280
        max_height: 720
        jpeg_quality: 0.78
        max_frame_bytes: 524288 # Per-frame byte limit after compression.
        ws_max_message_bytes: 1048576 # Max WebSocket message size for visual input.
        max_recent_frames: 2
        frame_ttl_ms: 10000 # Drop visual frames older than this.
    turn_enabled: true
    turn_port: 8443 # TCP port for embedded TURN server, useful through SSH tunnels.
    turn_realm: "cyberverse"
    turn_username: "cyberverse"
    turn_password: "${TURN_PASSWORD}"
    ice_public_ip: "" # REQUIRED for remote Direct WebRTC: public hostname or IP (not 127.0.0.1). Used in turn:HOST:PORT sent to browsers.

recording:
    # Enables per-turn MP4, raw WAV, and transcript files.
    enabled: true
    # Used when a session has no character-specific recording directory.
    # Character sessions are stored under data/characters/.../sessions/...
    output_dir: "./recordings"
    # x264 CRF. Lower means higher quality and larger files.
    crf: 23

inference_grpc:
    addr: "localhost:50051"
