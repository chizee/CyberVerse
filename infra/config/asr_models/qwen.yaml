qwen:
    plugin_class: "inference.plugins.asr.qwen_asr_plugin.QwenASRPlugin"
    api_key: "${DASHSCOPE_API_KEY}"
    model: "qwen3-asr-flash-realtime"
    language: "auto" # Auto-detect language; set a code to force one.
    sample_rate: 16000
    vad_threshold: 0.8 # Speech detection sensitivity for ASR turns.
    vad_silence_duration_ms: 600 # Silence duration that finalizes ASR text.
